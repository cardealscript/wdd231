<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="author" content="Cardeal Felisberto">
  <title>Message Sent — CapitalFlow</title>
  <link rel="icon" href="images/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/contact.css">
  <script type="module" src="scripts/contact.js"></script>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="brand" aria-label="CapitalFlow Home">
        <img src="images/logo.svg" alt="CapitalFlow Logo" width="200" loading="lazy">
      </a>
      <nav class="main-nav" aria-label="Main navigation">
        <button class="hamburger" id="menuToggle" aria-expanded="false" aria-controls="navLinks" aria-label="Toggle navigation">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="navLinks" role="list">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
          <li><a href="tips.html" class="nav-link">Tips</a></li>
          <li><a href="contact.html" class="nav-link nav-cta">Get Started</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="confirm-wrapper">
      <div class="confirm-card">

        <div class="confirm-icon">
          <img src="images/icons/shield-lock-fill.svg" alt="" width="36" height="36" aria-hidden="true">
        </div>

        <h1>Message Sent!</h1>
        <p class="confirm-sub">Thank you for reaching out. Here's a summary of what you submitted:</p>

        <!-- Display submitted form data -->
        <div class="confirm-data" id="confirmData">
          <!-- Populated by JS via URLSearchParams -->
        </div>

        <div class="confirm-actions">
          <a href="index.html" class="btn btn-primary">Back to Home</a>
          <a href="dashboard.html" class="btn btn-ghost">Open Dashboard</a>
        </div>

      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="images/logo.svg" alt="CapitalFlow" width="100" loading="lazy">
      </div>
      <nav class="footer-nav" aria-label="Footer navigation">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="tips.html">Tips</a>
        <a href="attributions.html">Attributions</a>
      </nav>
      <p class="footer-copy">
        &copy; <span id="footerYear"></span> CapitalFlow &mdash;
        <a href="https://youtu.be/RJt446N2pVM" target="_blank" rel="noopener" class="video-link">
          <img src="images/icons/camera-video-fill.svg" alt="" width="14" height="14" aria-hidden="true">
          Video Demo
        </a>
      </p>
    </div>
  </footer>
