<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CapitalFlow Financial Tips — Browse 20+ expert tips on budgeting, saving, investing, and managing debt to improve your personal finances.">
  <meta name="author" content="Cardeal Felisberto">
  <meta property="og:title" content="CapitalFlow — Financial Tips">
  <meta property="og:description" content="Browse curated financial tips on budgeting, saving, investing, and debt management.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cardealscript.github.io/wdd231/final/tips.html">
  <meta property="og:image" content="https://cardealscript.github.io/wdd231/final/images/logo.svg">
  <title>Financial Tips — CapitalFlow</title>
  <link rel="icon" href="images/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/tips.css">
  <script type="module" src="scripts/tips.js"></script>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="brand" aria-label="CapitalFlow Home">
        <img src="images/logo.svg" alt="CapitalFlow Logo" width="200" loading="lazy">
      </a>
      <nav class="main-nav" aria-label="Main navigation">
        <button class="hamburger" id="menuToggle" aria-expanded="false" aria-controls="navLinks" aria-label="Toggle navigation">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-links" id="navLinks">
          <li><a href="index.html" class="nav-link">Home</a></li>
          <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
          <li><a href="tips.html" class="nav-link active" aria-current="page">Tips</a></li>
          <li><a href="contact.html" class="nav-link nav-cta">Get Started</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>

    <!-- PAGE HEADER -->
    <div class="page-header">
      <h1>Financial Tips</h1>
      <p>Curated advice to help you budget smarter, save more, and invest wisely.</p>
    </div>

    <div class="tips-wrapper">

      <!-- CONTROLS -->
      <div class="tips-controls">

        <!-- Search -->
        <div class="search-wrap">
          <img src="images/icons/search.svg" alt="" width="16" height="16" aria-hidden="true" class="search-icon">
          <input type="search" id="searchInput" placeholder="Search tips..." aria-label="Search tips">
        </div>

        <!-- Category filters -->
        <div class="filter-chips" role="group" aria-label="Filter by category" id="filterChips">
          <button class="chip active" data-category="all">All</button>
          <button class="chip" data-category="Budgeting">Budgeting</button>
          <button class="chip" data-category="Saving">Saving</button>
          <button class="chip" data-category="Investing">Investing</button>
          <button class="chip" data-category="Debt">Debt</button>
          <button class="chip" data-category="Income">Income</button>
          <button class="chip" data-category="Mindset">Mindset</button>
        </div>

        <!-- Level filter + count -->
        <div class="tips-meta">
          <select id="levelFilter" aria-label="Filter by level">
            <option value="all">All Levels</option>
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
          </select>
          <span class="tips-count" id="tipsCount" aria-live="polite">0 tips</span>
        </div>

      </div>

      <!-- TIPS GRID -->
      <div class="tips-grid" id="tipsGrid" aria-label="Financial tips">
        <!-- Populated by JS -->
      </div>

      <!-- EMPTY STATE -->
      <div class="tips-empty" id="tipsEmpty" hidden>
        <img src="images/icons/search.svg" alt="" width="32" height="32" aria-hidden="true">
        <p>No tips found for your search.</p>
        <button class="btn btn-ghost btn-sm" id="clearSearch">Clear filters</button>
      </div>

      <!-- LOADING STATE -->
      <div class="tips-loading" id="tipsLoading" aria-live="polite">
        <p>Loading tips...</p>
      </div>

    </div>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <img src="images/logo.svg" alt="CapitalFlow" width="100" loading="lazy">
      </div>
      <nav class="footer-nav" aria-label="Footer navigation">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="tips.html">Tips</a>
        <a href="attributions.html">Attributions</a>
      </nav>
      <p class="footer-copy">
        &copy; <span id="footerYear"></span> CapitalFlow &mdash;
        <a href="https://youtu.be/RJt446N2pVM" target="_blank" rel="noopener" class="video-link">
          <img src="images/icons/camera-video-fill.svg" alt="" width="14" height="14" aria-hidden="true">
          Video Demo
        </a>
      </p>
    </div>
  </footer>

  <!-- TIP DETAIL MODAL -->
  <div class="modal-overlay" id="tipModal" role="dialog" aria-modal="true" aria-labelledby="tipModalTitle">
    <div class="modal tip-modal">
      <button class="modal-close" id="tipModalClose" aria-label="Close modal">✕</button>
      <div class="tip-modal-header">
        <span class="tip-modal-icon" id="tipModalIcon"></span>
        <div>
          <div class="tip-modal-badges">
            <span class="badge" id="tipModalCategory"></span>
            <span class="badge badge-level" id="tipModalLevel"></span>
            <span class="badge badge-tag" id="tipModalTag"></span>
          </div>
          <h3 id="tipModalTitle"></h3>
        </div>
      </div>
      <p class="tip-modal-summary" id="tipModalSummary"></p>
      <div class="tip-modal-divider"></div>
      <p class="tip-modal-detail" id="tipModalDetail"></p>
      <div class="tip-modal-footer">
        <a href="dashboard.html" class="btn btn-primary btn-sm">Apply in Dashboard →</a>
      </div>
    </div>
  </div>

</body>
</html>
